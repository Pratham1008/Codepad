name: codepad

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codepad_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codepad_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-service:
    build: 
      context: ./api-service
      dockerfile: Dockerfile
    container_name: api-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/codepad_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_PROFILES_ACTIVE=local
      - WORKER_URL=http://worker-service:8081
      - INTERNAL_SECRET=local-dev-secret
      - JWT_SECRET=local-dev-jwt-secret-must-be-at-least-256-bits-long-for-hs256!!

    depends_on:
      postgres:
        condition: service_healthy

  judge-worker:
    build:
      context: ./worker-service
      dockerfile: Dockerfile
    container_name: worker-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - API_SERVICE_URL=http://api-service:8080
      - INTERNAL_SECRET=local-dev-secret

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata-local:
