server:
  port: 8081

spring:
  application:
    name: worker-service
  threads:
    virtual:
      enabled: true

app:
  monolith:
    url: ${API_SERVICE_URL:http://localhost:8080}
  internal:
    secret: ${INTERNAL_SECRET:change-me-in-production}
  judge:
    pool-size-per-language: ${POOL_SIZE_PER_LANGUAGE:3}

logging:
  level:
    org.springframework.web: INFO
    com.codepad.workerservice: DEBUG
